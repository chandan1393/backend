# ═══════════════════════════════════════════════════════════════════════════
# LOCAL DEVELOPMENT PROFILE — application-local.properties
# Run with: java -jar app.jar --spring.profiles.active=local
# Or in application.properties: spring.profiles.active=local
# ═══════════════════════════════════════════════════════════════════════════

# Database — local PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/assignease_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — verbose for development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT — local secret (change this before production)
app.jwt.secret=localDevSecretKeyAssignEase2024SuperLongKeyForJWT12345678901234
app.jwt.expiration=86400000
app.jwt.refreshExpiration=604800000

# Mail — use Mailtrap or real Gmail for local testing
spring.mail.host=smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=your_mailtrap_username
spring.mail.password=your_mailtrap_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Stripe — test keys
stripe.secret.key=sk_test_YOUR_TEST_KEY
stripe.webhook.secret=whsec_YOUR_LOCAL_WEBHOOK_SECRET

# Twilio — sandbox for local testing
twilio.account.sid=YOUR_TWILIO_SID
twilio.auth.token=YOUR_TWILIO_TOKEN
twilio.whatsapp.from=987654321

# CORS — allow local Angular dev server
app.cors.allowed-origins=http://localhost:4200

# Frontend URL for password reset links
app.frontend.url=http://localhost:4200

# File uploads — stored locally
app.upload.dir=uploads/

# Company config
app.company.name=EduAssist

# Logging — verbose for development
logging.level.com.assignease=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG


