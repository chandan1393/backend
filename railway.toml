# ═══════════════════════════════════════════════════════════════════════════
# Railway Deployment Configuration — railway.toml
#
# Railway auto-detects the Maven build and runs the JAR.
# All environment variables are set in Railway Dashboard → Variables.
# ═══════════════════════════════════════════════════════════════════════════

[build]
builder = "nixpacks"

[build.env]
MAVEN_OPTS = "-Xmx512m"

[deploy]
healthcheckPath = "/api/auth/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Start command — activates prod profile
startCommand = "java -Xmx400m -Xms128m -jar target/*.jar --spring.profiles.active=prod"
