# ═══════════════════════════════════════════════════════════════════════════
# PRODUCTION PROFILE (Railway) — application-prod.properties
#
# Railway PostgreSQL plugin auto-injects these env vars:
#   DATABASE_URL  = postgresql://user:pass@host:5432/railway   (NOT jdbc: prefix)
#   PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
#
# Spring Boot 3 datasource accepts postgresql:// URLs directly via the
# spring.datasource.url property when using the Postgres driver — BUT only
# if we convert it. The safest approach is to set SPRING_DATASOURCE_URL
# in Railway Variables as: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
#
# ── REQUIRED Railway Variables (set in Railway → Variables) ──────────────
# SPRING_DATASOURCE_URL  jdbc:postgresql://<PGHOST>:<PGPORT>/<PGDATABASE>
# SPRING_DATASOURCE_USERNAME  (same as PGUSER)
# SPRING_DATASOURCE_PASSWORD  (same as PGPASSWORD)
# JWT_SECRET              64+ random chars
# MAIL_USERNAME           your Gmail address
# MAIL_PASSWORD           Gmail App Password (16 chars)
# STRIPE_SECRET_KEY       sk_live_...
# STRIPE_WEBHOOK_SECRET   whsec_...
# TWILIO_ACCOUNT_SID      AC...
# TWILIO_AUTH_TOKEN       ...
# TWILIO_WHATSAPP_FROM    whatsapp:+14155238886
# FRONTEND_URL            https://your-app.vercel.app
# ═══════════════════════════════════════════════════════════════════════════

# ── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari pool — keep small for Railway's 512MB limit
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# PostgreSQLDialect auto-detected — no need to specify explicitly

# ── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refreshExpiration=${JWT_REFRESH_EXPIRATION:604800000}

# ── Mail ─────────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# ── Stripe ────────────────────────────────────────────────────────────────────
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

# ── Twilio ────────────────────────────────────────────────────────────────────
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.whatsapp.from=${TWILIO_WHATSAPP_FROM}

# ── CORS + Frontend ───────────────────────────────────────────────────────────
app.cors.allowed-origins=${FRONTEND_URL}
app.frontend.url=${FRONTEND_URL}

# ── File storage ──────────────────────────────────────────────────────────────
app.upload.dir=/app/uploads/
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ── Company ───────────────────────────────────────────────────────────────────
app.company.name=${APP_COMPANY_NAME:EduAssist}

# ── Server port (Railway injects PORT) ───────────────────────────────────────
server.port=${PORT:8080}

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.assignease=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

