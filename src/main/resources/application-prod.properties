# ═══════════════════════════════════════════════════════════════════════════
# PRODUCTION PROFILE (Railway) — application-prod.properties
# 
# All sensitive values below come from Railway environment variables.
# Set each variable in your Railway project → Variables tab.
# Never commit real credentials to this file.
#
# Railway auto-provides DATABASE_URL for the PostgreSQL add-on.
# ═══════════════════════════════════════════════════════════════════════════

# ── Database (Railway PostgreSQL add-on) ────────────────────────────────────
# Railway injects DATABASE_URL as: postgresql://user:pass@host:port/dbname
# Spring needs the jdbc: prefix — use the JDBC_URL var set below in railway.toml
logging.level.org.springframework.boot.context.config=DEBUG
spring.datasource.url=jdbc:postgresql://${PG_HOST}:${PG_PORT}/${PG_DATABASE}
spring.datasource.username=${PG_USER}
spring.datasource.password=${PG_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000

# ── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:assignEaseSecretKey2024SuperLongSecretKeyForJWTTokenGeneration12345678}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refreshExpiration=${JWT_REFRESH_EXPIRATION:604800000}

# ── Mail (Gmail SMTP) ────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:chandansharma1393@gmail.com}
spring.mail.password=${MAIL_PASSWORD:fsdfsdfsdfsd}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── Stripe ───────────────────────────────────────────────────────────────────
stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_51RisUR04biQtB2ksS4tWEn6xBUzYPyVM6YAYSMQRYL0WXU0uux0q0s2dwyMK0udGWaGMuGDdiVR9tnzoFwOU2wkT00EvcQoXrD}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:sdfsdfsdsdfsdf}

# ── Twilio WhatsApp ──────────────────────────────────────────────────────────
