# ── CORS ─────────────────────────────────────────────────────────────────────
# Set this to your Vercel/Netlify/custom frontend URL
app.cors.allowed-origins=${FRONTEND_URL:localhost:4200}

# ── Frontend URL (for password reset emails) ─────────────────────────────────
app.frontend.url=${FRONTEND_URL:localhost:4200}

# ── File uploads on Railway ──────────────────────────────────────────────────
# NOTE: Railway's filesystem is ephemeral — files are lost on redeploy.
# For production, use an S3-compatible bucket (Cloudflare R2 / AWS S3).
# Set STORAGE_TYPE=s3 and configure S3 credentials when ready.
# For now, local filesystem is used (fine for demos and early stage):
app.upload.dir=/app/uploads/
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ── Company ──────────────────────────────────────────────────────────────────
app.company.name=${APP_COMPANY_NAME:EduAssist}

# ── Server port (Railway injects PORT) ───────────────────────────────────────
server.port=${PORT:8080}

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.assignease=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# ── Actuator health check (Railway uses /health for healthchecks) ─────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
