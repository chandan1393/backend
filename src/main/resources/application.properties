# ═══════════════════════════════════════════════════════════════════════════
# BASE CONFIGURATION — application.properties
#
# Profile-specific config lives in:
#   application-local.properties   ← local development
#   application-prod.properties    ← Railway production
#
# To run locally:   java -jar app.jar --spring.profiles.active=local
# Railway sets:     SPRING_PROFILES_ACTIVE=prod  (via railway.toml)
# ═══════════════════════════════════════════════════════════════════════════

# Active profile (overridden by env var SPRING_PROFILES_ACTIVE on Railway)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ── Timezone — always UTC ────────────────────────────────────────────────────
spring.jackson.time-zone=UTC
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false

# ── File Upload limits ───────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB


management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
